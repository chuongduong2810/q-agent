# Alembic configuration for the Q-Agent backend.
#
# The actual database URL is resolved at runtime from `app.config.settings`
# (QAGENT_DATABASE_URL / the SQLite default) inside `migrations/env.py` — the
# `sqlalchemy.url` below is a placeholder only used by the bare `alembic`
# CLI when no app settings are available.

[alembic]
script_location = migrations
prepend_sys_path = .
path_separator = os
sqlalchemy.url = sqlite:///workspace/q-agent.db

[post_write_hooks]

# No [loggers]/[handlers] section: migrations/env.py deliberately skips
# `fileConfig` so alembic doesn't reset the app's own logging setup (see the
# comment in env.py). Alembic's own log lines fall back to Python's default
# logging behavior.
