# Q-Agent web tier: serve the built SPA and reverse-proxy the API/auth/websocket
# paths to the backend. Included inside nginx's http{} block, so the `map` below
# (which must live in http context) is valid here.

# WebSocket upgrade switch: forward `Connection: upgrade` only for WS requests,
# otherwise let keep-alive proceed normally.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# The api service on the compose network.
upstream qagent_api {
    server api:8787;
}

server {
    listen 5174;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Evidence annotations + Claude credential uploads flow through here.
    client_max_body_size 50m;

    # Local Agent installer downloads (Electron .exe + electron-updater
    # latest.yml/.blockmap), served straight from the bind-mounted ./downloads
    # dir. Public by design — the agent is a thin client (also on public npm).
    # A missing file returns a real 404, NOT the SPA index.html fallback.
    location /downloads/ {
        try_files $uri =404;
        default_type application/octet-stream;
        add_header Content-Disposition "attachment";
        add_header Cache-Control "no-cache";
    }

    # SPA client-side routes (/runs, /projects, …) fall back to index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Same-origin API. The trailing slash on proxy_pass strips the /api prefix,
    # so the backend sees /runs, /ws/ai, /artifacts/... exactly as in dev. This
    # also carries the /api/ws/* websockets.
    location /api/ {
        proxy_pass http://qagent_api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # AI analysis / project-bootstrap can run for minutes — don't 504 them.
        proxy_read_timeout 1800s;
        proxy_send_timeout 1800s;
    }

    # Auth keeps its own path (NOT under /api) so the httpOnly refresh + CSRF
    # cookies flow (ADR 0007). No prefix rewrite — backend serves /auth/* too.
    location /auth/ {
        proxy_pass http://qagent_api/auth/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
