  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

rgin-bottom:16px\">\n        <label style=\"display:block;font-size:12px;font-weight:600;color:#9494a6;margin-bottom:8px\">Server URL<\u002Flabel>\n        <div style=\"display:flex;align-items:center;gap:10px;height:46px;padding:0 14px;border-radius:12px;background:#16161f;border:1px solid {{ urlBorder }};transition:border-color .18s\">\n          <svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#7a7a8c\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"flex-shrink:0\"><circle cx=\"12\" cy=\"12\" r=\"9\"><\u002Fcircle><path d=\"M3 12h18M12 3a15 15 0 0 1 0 18M12 3a15 15 0 0 0 0 18\"><\u002Fpath><\u002Fsvg>\n          <input value=\"{{ serverUrl }}\" oninput=\"{{ onUrl }}\" onfocus=\"{{ focusUrl }}\" onblur=\"{{ blurField }}\" placeholder=\"https://your-qagent-server/api\" style=\"flex:1;min-width:0;background:none;border:none;outline:none;color:#ECECF1;font-size:13.5px;font-family:inherit\">\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"f-stag\" style=\"margin-bottom:22px\">\n        <label style=\"display:flex;justify-content:space-between;align-items:center;font-size:12px;font-weight:600;color:#9494a6;margin-bottom:8px\"><span>Pair code<\u002Fspan><span style=\"font-size:10.5px;font-weight:600;color:#6c6c7e\">one-time · expires in 10 min<\u002Fspan><\u002Flabel>\n        <div style=\"position:relative\">\n          <input value=\"{{ pairCode }}\" oninput=\"{{ onCode }}\" onfocus=\"{{ focusCode }}\" onblur=\"{{ blurField }}\" inputmode=\"numeric\" maxlength=\"6\" style=\"position:absolute;inset:0;width:100%;height:100%;opacity:0;cursor:text;font-size:16px;z-index:2\">\n          <div style=\"display:flex;align-items:center;gap:11px;pointer-events:none\">\n            <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:9px;flex:1\">\n              <sc-for list=\"{{ codeCellsA }}\" as=\"c\" hint-placeholder-count=\"3\">\n                <div style=\"{{ c.style }}\">{{ c.char }}<span style=\"{{ c.caret }}\"><\u002Fspan><\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n            <span style=\"width:13px;height:2.5px;border-radius:2px;background:#3a3a48;flex-shrink:0\"><\u002Fspan>\n            <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:9px;flex:1\">\n              <sc-for list=\"{{ codeCellsB }}\" as=\"c\" hint-placeholder-count=\"3\">\n                <div style=\"{{ c.style }}\">{{ c.char }}<span style=\"{{ c.caret }}\"><\u002Fspan><\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <button onclick=\"{{ connect }}\" style=\"{{ connectBtn }}\" style-hover=\"{{ connectBtnHover }}\">\n        <sc-if value=\"{{ busy }}\" hint-placeholder-val=\"\"><span style=\"width:16px;height:16px;border:2px solid rgba(255,255,255,.35);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite\"><\u002Fspan><\u002Fsc-if>\n        <sc-if value=\"{{ showBolt }}\" hint-placeholder-val=\"{{ true }}\"><svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M13 2 3 14h7l-1 8 10-12h-7z\"><\u002Fpath><\u002Fsvg><\u002Fsc-if>\n        {{ btnLabel }}\n      <\u002Fbutton>\n    <\u002Fdiv>\n\n    <!-- reassurance + local env -->\n    <div style=\"display:flex;align-items:center;gap:8px;margin:16px 2px 14px;font-size:11.5px;color:#7a7a8c\">\n      <svg width=\"13\" height=\"13\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#6ee7b7\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"flex-shrink:0\"><rect x=\"3\" y=\"11\" width=\"18\" height=\"10\" rx=\"2\"><\u002Frect><path d=\"M7 11V8a5 5 0 0 1 10 0v3\"><\u002Fpath><\u002Fsvg>\n      <span>Your session and credentials never leave this machine.<\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"display:flex;flex-wrap:wrap;gap:8px;padding:0 2px\">\n      <sc-for list=\"{{ envChips }}\" as=\"c\" hint-placeholder-count=\"3\">\n        <span style=\"display:inline-flex;align-items:center;gap:6px;padding:5px 10px;border-radius:9px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);font-size:10.5px;color:#9494a6\"><span style=\"width:6px;height:6px;border-radius:50%;background:{{ c.dot }}\"><\u002Fspan><span style=\"color:#c3c3d0;font-weight:600\">{{ c.name }}<\u002Fspan><span style=\"font-family:'JetBrains Mono',monospace;color:#7a7a8c\">{{ c.ver }}<\u002Fspan><\u002Fspan>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ========== CONNECTED: LIVE AGENT ========== -->\n    <sc-if value=\"{{ connected }}\" hint-placeholder-val=\"\">\n    <div style=\"animation:fadeUp .5s ease both\">\n      <!-- live status card -->\n      <div style=\"position:relative;overflow:hidden;border-radius:22px;background:linear-gradient(135deg,rgba(16,185,129,.12),rgba(20,20,28,.55));backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);border:1px solid rgba(52,211,153,.28);padding:22px;box-shadow:0 24px 60px -22px rgba(0,0,0,.7);margin-bottom:14px\">\n        <div style=\"display:flex;align-items:center;gap:13px\">\n          <div style=\"width:42px;height:42px;border-radius:12px;background:rgba(52,211,153,.13);border:1px solid rgba(52,211,153,.28);display:flex;align-items:center;justify-content:center;flex-shrink:0\"><svg width=\"21\" height=\"21\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#34d399\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"2\" y=\"3\" width=\"20\" height=\"14\" rx=\"2\"><\u002Frect><path d=\"M8 21h8M12 17v4\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n          <div style=\"flex:1;min-width:0\">\n            <div style=\"font-size:15px;font-weight:700;color:#eafff6;letter-spacing:-.01em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">{{ machineName }}<\u002Fdiv>\n            <div style=\"display:flex;align-items:center;gap:6px;margin-top:3px\">\n              <span style=\"font-size:10px;font-weight:700;letter-spacing:.09em;color:#6c8c7e\">SESSION<\u002Fspan>\n              <span style=\"font-size:11.5px;color:#8fc7b3;font-family:'JetBrains Mono',monospace\">{{ sessionId }}<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- live log -->\n      <div style=\"border-radius:18px;background:rgba(8,8,13,.72);border:1px solid rgba(255,255,255,.08);overflow:hidden\">\n        <div style=\"display:flex;align-items:center;gap:8px;padding:11px 15px;border-bottom:1px solid rgba(255,255,255,.06)\">\n          <span style=\"width:7px;height:7px;border-radius:50%;background:#34d399;box-shadow:0 0 8px #34d399;animation:livePulse 1.6s ease-in-out infinite\"><\u002Fspan>\n          <span style=\"font-size:11px;font-weight:700;letter-spacing:.06em;color:#9494a6\">AGENT LOG<\u002Fspan>\n          <span style=\"margin-left:auto;display:flex;align-items:flex-end;gap:2px;height:12px\">\n            <span style=\"width:2.5px;height:100%;border-radius:2px;background:#34d399;transform-origin:bottom;animation:barPulse 1s ease-in-out infinite\"><\u002Fspan>\n            <span style=\"width:2.5px;height:100%;border-radius:2px;background:#34d399;transform-origin:bottom;animation:barPulse 1s ease-in-out infinite .2s\"><\u002Fspan>\n            <span style=\"width:2.5px;height:100%;border-radius:2px;background:#34d399;transform-origin:bottom;animation:barPulse 1s ease-in-out infinite .4s\"><\u002Fspan>\n          <\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"padding:13px 15px;font-family:'JetBrains Mono',monospace;font-size:11px;line-height:1.9;max-height:150px;overflow-y:auto\">\n          <sc-for list=\"{{ logs }}\" as=\"l\" hint-placeholder-count=\"4\">\n            <div style=\"display:flex;gap:10px;animation:logIn .4s ease both\"><span style=\"color:#5c5c6e;flex-shrink:0\">{{ l.t }}<\u002Fspan><span style=\"color:{{ l.color }}\">{{ l.msg }}<\u002Fspan><\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n   <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ===== preview state switcher ===== -->\n  <div style=\"position:absolute;bottom:14px;left:14px;z-index:40;display:flex;gap:4px;padding:5px;border-radius:12px;background:rgba(22,22,30,.82);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border:1px solid rgba(255,255,255,.1);box-shadow:0 16px 40px -18px #000\">\n    <sc-for list=\"{{ tabs }}\" as=\"t\" hint-placeholder-count=\"3\"><button onclick=\"{{ t.go }}\" style=\"{{ t.style }}\">{{ t.label }}<\u002Fbutton><\u002Fsc-for>\n  <\u002Fdiv>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:420,&quot;height&quot;:560}}\">\nclass Component extends DCLogic {\n  state = { phase:'idle', serverUrl:'', pairCode:'', focus:'' };\n\n  connect = () => {\n    if(!this.state.serverUrl.trim() || !this.state.pairCode.trim()) return;\n    this.setState({ phase:'connecting' });\n    clearTimeout(this._t);\n    this._t = setTimeout(()=>this.setState({ phase:'connected' }), 2200);\n  };\n  disconnect = () => this.setState({ phase:'idle' });\n\n  renderVals() {\n    const s = this.state;\n    const phase = s.phase;\n    const canConnect = !!(s.serverUrl.trim() && s.pairCode.length === 6);\n\n    const pillMap = {\n      idle:      { label:'Not connected', dot:'#7a7a8c', color:'#a0a0b2', bg:'rgba(255,255,255,.05)', border:'rgba(255,255,255,.1)',  anim:'none' },\n      connecting:{ label:'Connecting\\u2026', dot:'#a78bfa', color:'#c4b5fd', bg:'rgba(139,92,246,.16)', border:'rgba(139,92,246,.35)', anim:'livePulse 1.4s ease-in-out infinite' },\n      connected: { label:'Connected \\u00b7 Live', dot:'#34d399', color:'#6ee7b7', bg:'rgba(16,185,129,.14)', border:'rgba(52,211,153,.35)', anim:'livePulse 1.6s ease-in-out infinite' },\n    };\n\n    const connectBtnBase = 'display:flex;align-items:center;justify-content:center;gap:9px;width:100%;height:47px;border-radius:13px;border:none;font-family:inherit;font-weight:700;font-size:14.5px;transition:transform .15s,box-shadow .2s,opacity .2s;';\n    const connectBtn = canConnect\n      ? connectBtnBase + 'background:linear-gradient(135deg,#8b5cf6,#6366f1);color:#fff;cursor:pointer;box-shadow:0 12px 30px -10px rgba(139,92,246,.8)'\n      : connectBtnBase + 'background:rgba(255,255,255,.06);color:#6c6c7e;cursor:not-allowed;box-shadow:none';\n    const connectBtnHover = canConnect ? 'transform:translateY(-1px);box-shadow:0 16px 36px -10px rgba(139,92,246,.9)' : '';\n\n    const bd = (on)=> on ? 'rgba(139,92,246,.55)' : 'rgba(255,255,255,.1)';\n\n    const code = s.pairCode;\n    const codeActive = s.focus === 'code';\n    const cellBase = 'position:relative;display:flex;align-items:center;justify-content:center;height:54px;border-radius:12px;background:#16161f;font-family:\\'JetBrains Mono\\',monospace;font-size:24px;font-weight:600;color:#ECECF1;transition:border-color .16s,box-shadow .16s;';\n    const cells = Array.from({length:6}, (_,i)=>{\n      const char = code[i] || '';\n      const filled = i < code.length;\n      const active = codeActive && i === code.length && code.length < 6;\n      let border, shadow;\n      if(active){ border='1.5px solid #8b5cf6'; shadow='box-shadow:0 0 0 3px rgba(139,92,246,.18);'; }\n      else if(filled){ border='1.5px solid rgba(255,255,255,.16)'; shadow=''; }\n      else { border='1.5px solid rgba(255,255,255,.09)'; shadow=''; }\n      return {\n        char,\n        style: cellBase + 'border:' + border + ';' + shadow,\n        caret: active\n          ? 'display:inline-block;width:2px;height:24px;background:#a78bfa;animation:caret 1.1s step-end infinite'\n          : 'display:none',\n      };\n    });\n\n    const tabsDef = [ ['idle','Not connected'], ['connecting','Connecting'], ['connected','Connected'] ];\n    const tabs = tabsDef.map(([k,label])=>({\n      label,\n      go: ()=>this.setState({ phase:k }),\n      style: 'padding:6px 12px;border-radius:9px;border:none;cursor:pointer;font-family:inherit;font-size:11px;font-weight:600;transition:all .18s;'+(phase===k\n        ? 'background:linear-gradient(135deg,#8b5cf6,#6366f1);color:#fff'\n        : 'background:transparent;color:#8b8b9e')\n    }));\n\n    return {\n      notConnected: phase==='idle',\n      connecting:   phase==='connecting',\n      connected:    phase==='connected',\n      showForm:     phase==='idle' || phase==='connecting',\n      busy:         phase==='connecting',\n      showBolt:     phase!=='connecting' && canConnect,\n      btnLabel:     phase==='connecting' ? 'Connecting\\u2026' : 'Connect',\n      pill: pillMap[phase],\n      serverUrl: s.serverUrl,\n      pairCode: s.pairCode,\n      onUrl: (e)=>this.setState({ serverUrl:e.target.value }),\n      onCode: (e)=>this.setState({ pairCode:e.target.value.replace(/\\D/g,'').slice(0,6) }),\n      focusUrl: ()=>this.setState({ focus:'url' }),\n      focusCode: ()=>this.setState({ focus:'code' }),\n      blurField: ()=>this.setState({ focus:'' }),\n      urlBorder: bd(s.focus==='url'),\n      codeCellsA: cells.slice(0,3),\n      codeCellsB: cells.slice(3,6),\n      canConnect,\n      connect: this.connect,\n      disconnect: this.disconnect,\n      connectBtn, connectBtnHover,\n      envChips: [\n        { name:'Playwright', ver:'1.53', dot:'#34d399' },\n        { name:'Node', ver:'20.14', dot:'#6ee7b7' },\n        { name:'Chromium', ver:'126', dot:'#60a5fa' },\n      ],\n      machineName: 'MAYA-WIN-01',\n      sessionId: 'la_7Kp29Qd4',\n      logs: [\n        { t:'12:04:02', color:'#8b8b9e', msg:'handshake accepted \\u2192 server' },\n        { t:'12:04:02', color:'#6ee7b7', msg:'pair code verified' },\n        { t:'12:04:03', color:'#8b8b9e', msg:'browsers detected: chromium, firefox, webkit' },\n        { t:'12:04:03', color:'#c4b5fd', msg:'agent registered \\u00b7 waiting for runs' },\n      ],\n      tabs,\n    };\n  }\n}\n<\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
