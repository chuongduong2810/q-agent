# Q-Agent — build & run the whole stack in Docker.
#
#   1. cp .env.example .env      # then fill in the secrets
#   2. docker compose up -d --build
#   3. open http://localhost:5174   (or point your Cloudflare tunnel at :5174)
#
# After the first boot, sign in as the admin from .env, then in the app:
#   • Settings → AI: upload your Claude .credentials.json (auth for server-side AI)
#   • Settings: set Execution target = Local Agent, and pair your Local Agent —
#     this image ships no Playwright, so tests run on the agent, not the server.

services:
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    environment:
      QAGENT_HOST: 0.0.0.0
      QAGENT_PORT: "8787"
      # Auth (ADR 0007). Keep COOKIE_SECURE=false for plain-http localhost; it
      # still works behind an HTTPS Cloudflare tunnel (Secure just isn't set).
      QAGENT_AUTH_REQUIRED: "true"
      QAGENT_COOKIE_SECURE: "false"
      # CHANGE THIS — derives the credential-encryption key + signs auth JWTs.
      QAGENT_SECRET_KEY: ${QAGENT_SECRET_KEY:?set QAGENT_SECRET_KEY in .env}
      # First-admin seed (created when the users table is empty) — how you log in.
      QAGENT_ADMIN_EMAIL: ${QAGENT_ADMIN_EMAIL:-admin@qagent.local}
      QAGENT_ADMIN_PASSWORD: ${QAGENT_ADMIN_PASSWORD:?set QAGENT_ADMIN_PASSWORD in .env}
      QAGENT_CLAUDE_MODEL: ${QAGENT_CLAUDE_MODEL:-claude-sonnet-5}
      # Connect to the bundled Postgres (service `db`) over the compose network.
      # Alembic applies the schema against it on boot.
      QAGENT_DATABASE_URL: postgresql+psycopg://${QAGENT_DB_USER:-qagent}:${QAGENT_DB_PASSWORD:-qagent}@db:5432/${QAGENT_DB_NAME:-qagent}
    volumes:
      # Persist evidence, specs, knowledge, cloned repos and the materialized
      # Claude credentials across restarts. (The database now lives in Postgres.)
      - qagent-workspace:/app/api/workspace
    expose:
      - "8787"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8787/health').status==200 else 1)"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${QAGENT_DB_USER:-qagent}
      POSTGRES_PASSWORD: ${QAGENT_DB_PASSWORD:-qagent}
      POSTGRES_DB: ${QAGENT_DB_NAME:-qagent}
    volumes:
      - qagent-db:/var/lib/postgresql/data
    # Published so host tools (DBeaver, psql) can connect at localhost:5456.
    # Override the host port with QAGENT_DB_PORT in .env if 5456 is taken.
    ports:
      - "${QAGENT_DB_PORT:-5456}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${QAGENT_DB_USER:-qagent} -d ${QAGENT_DB_NAME:-qagent}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  web:
    build:
      context: ./app
      dockerfile: Dockerfile
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "5174:5174"
    volumes:
      # Local Agent installers (Electron .exe + electron-updater latest.yml),
      # served at <origin>/downloads/. Built out-of-band on Windows
      # (agent: npm run release) and dropped here — no image rebuild to publish.
      - ./downloads:/usr/share/nginx/html/downloads:ro
    restart: unless-stopped

volumes:
  qagent-workspace:
  qagent-db:
